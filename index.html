<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Борис · Управленческий контур</title>
  <meta name="description" content="Управленческий учёт: платёжные документы, накладные, двойной контроль обязательств">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232953d1'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3EБ%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">Б</div>
        <div>
          <div class="brand-name">Управленческий контур</div>
          <div class="brand-sub">платежи · ТМЦ · контроль</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a href="#/dashboard" data-route="dashboard"><span class="nav-ico">◈</span>Дашборд<span class="nav-flag" id="navFlagCount" hidden></span></a>
        <a href="#/deals" data-route="deals"><span class="nav-ico">🤝</span>Сделки</a>
        <a href="#/payments" data-route="payments"><span class="nav-ico">💳</span>Платёжные документы</a>
        <a href="#/waybills" data-route="waybills"><span class="nav-ico">📦</span>Накладные</a>
        <div class="nav-sep">Регистры</div>
        <a href="#/tmc" data-route="tmc"><span class="nav-ico">📈</span>График ТМЦ</a>
        <a href="#/cashflow" data-route="cashflow"><span class="nav-ico">💰</span>CashFlow-календарь</a>
        <a href="#/matrix" data-route="matrix"><span class="nav-ico">▦</span>Матрица ресурсов</a>
        <a href="#/journal" data-route="journal"><span class="nav-ico">🗒</span>Журнал проведения</a>
        <div class="nav-sep">Документация</div>
        <a href="#/help" data-route="help"><span class="nav-ico">§</span>Спецификация</a>
      </nav>
      <div class="sidebar-foot">
        <button class="btn btn-ghost btn-sm" id="btnDemo" title="Загрузить демонстрационный сценарий">Демо-данные</button>
        <div class="foot-row">
          <button class="btn btn-ghost btn-sm" id="btnExport" title="Скачать все данные в JSON">Экспорт</button>
          <button class="btn btn-ghost btn-sm" id="btnImport" title="Загрузить данные из JSON">Импорт</button>
          <button class="btn btn-ghost btn-sm btn-danger-ghost" id="btnWipe" title="Удалить все данные">Сброс</button>
        </div>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-wrap">
      <header class="topbar">
        <button class="burger" id="burger" aria-label="Меню">☰</button>
        <h1 id="pageTitle">Дашборд</h1>
        <div class="topbar-right">
          <span class="today-chip" id="todayChip"></span>
        </div>
      </header>
      <main class="main" id="main"></main>
    </div>
  </div>
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" id="modal">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Закрыть">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <div class="toasts" id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
