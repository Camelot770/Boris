<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Борис · Управленческий контур</title>
  <meta name="description" content="Управленческий учёт: платёжные документы, накладные, двойной контроль обязательств">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231c1a15'/%3E%3Crect x='6' y='6' width='88' height='88' fill='none' stroke='%23f4f1e8' stroke-width='3'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='%23f4f1e8' font-family='Georgia,serif' font-weight='bold'%3E%D0%91%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Sans+Narrow:wght@400;700&family=PT+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">Б</div>
        <div>
          <div class="brand-name">Управленческий контур</div>
          <div class="brand-sub">платежи · ТМЦ · контроль</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a href="#/dashboard" data-route="dashboard"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>Дашборд<span class="nav-flag" id="navFlagCount" hidden></span></a>
        <a href="#/deals" data-route="deals"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h13l-3-3M21 16H8l3 3"/></svg></span>Сделки</a>
        <a href="#/payments" data-route="payments"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="1"/><path d="M3 10.5h18"/></svg></span>Платёжные документы</a>
        <a href="#/waybills" data-route="waybills"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4v10l-8 4-8-4V7z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg></span>Накладные</a>
        <div class="nav-sep">Регистры</div>
        <a href="#/tmc" data-route="tmc"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16h16"/><path d="M7.5 14l3.5-4.5 3 2.5 4.5-5.5"/></svg></span>График ТМЦ</a>
        <a href="#/cashflow" data-route="cashflow"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="1"/><path d="M3 10.5h18M16.5 14.5h1.5"/></svg></span>CashFlow-календарь</a>
        <a href="#/matrix" data-route="matrix"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1"/><path d="M3 9h18M9.5 9v11M15 9v11"/></svg></span>Матрица ресурсов</a>
        <a href="#/journal" data-route="journal"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h13v18H6a2 2 0 01-2-2V5a2 2 0 012-2z"/><path d="M9 3v18M12.5 8h4M12.5 12h4"/></svg></span>Журнал проведения</a>
        <div class="nav-sep">Документация</div>
        <a href="#/help" data-route="help"><span class="nav-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4a2 2 0 012-2h12v20H7a2 2 0 01-2-2z"/><path d="M5 18h14"/></svg></span>Спецификация</a>
      </nav>
      <div class="sidebar-foot">
        <button class="btn btn-ghost btn-sm" id="btnDemo" title="Загрузить демонстрационный сценарий">Демо-данные</button>
        <div class="foot-row">
          <button class="btn btn-ghost btn-sm" id="btnExport" title="Скачать все данные в JSON">Экспорт</button>
          <button class="btn btn-ghost btn-sm" id="btnImport" title="Загрузить данные из JSON">Импорт</button>
          <button class="btn btn-ghost btn-sm btn-danger-ghost" id="btnWipe" title="Удалить все данные">Сброс</button>
        </div>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-wrap">
      <header class="topbar">
        <button class="burger" id="burger" aria-label="Меню"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
        <h1 id="pageTitle">Дашборд</h1>
        <div class="topbar-right">
          <span class="today-chip" id="todayChip"></span>
        </div>
      </header>
      <main class="main" id="main"></main>
    </div>
  </div>
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" id="modal">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Закрыть"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <div class="toasts" id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
